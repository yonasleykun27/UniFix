<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniFix - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./Img/favicon_io/favicon-32x32.png">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reset-card { max-width: 440px; width: 100%; }
    </style>
</head>
<body class="bg-university d-flex flex-column min-vh-100">
    <div class="reset-card card shadow-lg border-0 rounded-4 p-4">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill text-primary" style="font-size:3rem;"></i>
            <h3 class="fw-bold mt-2">Reset Your Password</h3>
            <p class="text-muted small">Enter your new password below.</p>
        </div>

        <div id="resetForm">
            <div class="mb-3">
                <label class="form-label fw-bold">New Password</label>
                <div class="input-group">
                    <input type="password" id="newPass" class="form-control form-control-lg" placeholder="Min 6 characters" autofocus>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePass('newPass', this)"><i class="bi bi-eye"></i></button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Confirm Password</label>
                <div class="input-group">
                    <input type="password" id="confirmPass" class="form-control form-control-lg" placeholder="Repeat new password">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePass('confirmPass', this)"><i class="bi bi-eye"></i></button>
                </div>
            </div>
            <div id="resetError" class="alert alert-danger d-none small"></div>
            <div id="resetSuccess" class="alert alert-success d-none small"></div>
            <button id="resetBtn" class="btn btn-primary w-100 btn-lg fw-bold" onclick="submitReset()">
                <i class="bi bi-check-lg me-1"></i>Reset Password
            </button>
        </div>

        <div class="text-center mt-3">
            <a href="index.html" class="text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
        </div>
    </div>

    <script>
        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        async function submitReset() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const nw = document.getElementById('newPass').value;
            const cf = document.getElementById('confirmPass').value;
            const errEl = document.getElementById('resetError');
            const sucEl = document.getElementById('resetSuccess');
            const btn = document.getElementById('resetBtn');
            
            if (btn.disabled) return; // Anti-spam

            const originalBtnHtml = btn.innerHTML;

            errEl.classList.add('d-none');
            sucEl.classList.add('d-none');

            if (!token) { errEl.textContent = 'Invalid reset link — no token found.'; errEl.classList.remove('d-none'); return; }
            if (!nw || !cf) { errEl.textContent = 'Both fields are required.'; errEl.classList.remove('d-none'); return; }
            if (nw.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.remove('d-none'); return; }
            if (nw !== cf) { errEl.textContent = 'Passwords do not match.'; errEl.classList.remove('d-none'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Resetting...';

            try {
                const res = await fetch('reset_password_api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: nw })
                });
                const data = await res.json();
                if (data.success) {
                    sucEl.textContent = data.message;
                    sucEl.classList.remove('d-none');
                    document.getElementById('resetForm').querySelectorAll('input, button').forEach(e => e.disabled = true);
                    setTimeout(() => window.location.href = 'index.html', 3000);
                } else {
                    errEl.textContent = data.message;
                    errEl.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = originalBtnHtml;
                }
            } catch (e) {
                errEl.textContent = 'Network error. Please try again.';
                errEl.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = originalBtnHtml;
            }
        }

        // Allow Enter key
        document.addEventListener('keydown', e => { 
            if (e.key === 'Enter') {
                const btn = document.getElementById('resetBtn');
                if (!btn.disabled) submitReset(); 
            }
        });
    </script>
</body>
</html>
